name: backend-ci

on:
  push:
    branches: [main]
    path-ignore:
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'

jobs:
  build-and-test:
    name: build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # CI uses placeholder connection strings so app startup succeeds without a real
    # Postgres or Redis. The current test suite only exercises /health/live, which
    # has no dependencies, so placeholders are sufficient. When DB-touching tests
    # land in week 2, this gets replaced with a real Postgres service container.
    env:
      ConnectionStrings__Postgres: "Host=localhost;Database=replyo_ci;Username=ci;Password=ci"
      ConnectionStrings__Redis: "localhost:6379"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal